<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Aluno | ITEL ELIM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Identidade ITEL ELIM */
            --primary: #d4e117;       /* Amarelo Limão */
            --secondary: #009ce0;     /* Azul Ciano */
            --bg-deep: #0d1a2b;       /* Azul Profundo */
            --bg-card: rgba(22, 42, 68, 0.5);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 10% 20%, rgba(0, 156, 224, 0.05), transparent 40%);
        }

        /* Navbar */
        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(13, 26, 43, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 100;
        }

        .nav-logo {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--secondary);
            display: flex;
            align-items: center; gap: 12px;
            letter-spacing: 1px;
        }

        .user-pill {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 18px;
            border-radius: 50px;
            display: flex;
            align-items: center; gap: 15px;
            border: 1px solid var(--glass-border);
        }

        .logout-link {
            color: #ff4d4d;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        /* Conteúdo Principal */
        main {
            flex: 1;
            padding: 50px 5%;
            max-width: 1300px;
            margin: 0 auto;
            width: 100%;
        }

        .header-box {
            margin-bottom: 50px;
        }

        .unit-badge {
            display: inline-block;
            background: rgba(0, 156, 224, 0.1);
            color: var(--secondary);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 800;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-box h2 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        /* Grid de Cards */
        .studies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
        }

        .study-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 30px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .study-card:hover {
            transform: translateY(-12px);
            border-color: var(--secondary);
            background: rgba(22, 42, 68, 0.8);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .category-tag {
            color: var(--primary);
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
            display: block;
        }

        .study-card h3 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            line-height: 1.3;
            font-weight: 700;
        }

        .study-card p {
            color: var(--text-dim);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 25px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--glass-border);
            padding-top: 20px;
        }

        .date-info {
            font-size: 0.75rem;
            color: var(--text-dim);
            display: flex;
            align-items: center; gap: 6px;
        }

        .btn-read {
            text-decoration: none;
            color: var(--bg-deep);
            background: var(--primary);
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .btn-read:hover {
            filter: brightness(1.1);
            transform: scale(1.05);
        }

        /* Estado Vazio */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 0;
            background: rgba(255,255,255,0.02);
            border-radius: 30px;
            border: 2px dashed var(--glass-border);
        }

        .empty-state i { font-size: 3.5rem; color: var(--secondary); opacity: 0.3; margin-bottom: 20px; }

        @media (max-width: 768px) {
            .header-box h2 { font-size: 1.8rem; }
            .studies-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">
            <i class="fas fa-feather-alt"></i>
            <span>ITEL ELIM</span>
        </div>
        <div class="user-pill">
            <span style="font-size: 0.85rem; font-weight: 600;">Olá, {{ user.name }}</span>
            <a href="/api/auth/logout" class="logout-link">Sair</a>
        </div>
    </nav>

    <main>
        <header class="header-box">
            <span class="unit-badge"><i class="fas fa-church"></i> {{ user.unidade.nome_igreja }}</span>
            <h2>Meus Estudos</h2>
            <p style="color: var(--text-dim);">Acesse o material didático exclusivo da sua unidade.</p>
        </header>

        <div class="studies-grid" id="container-estudos">
            <div style="text-align: center; grid-column: 1/-1; padding: 50px; opacity: 0.5;">
                <i class="fas fa-circle-notch fa-spin"></i> Sincronizando biblioteca...
            </div>
        </div>
    </main>

    <script>
        async function carregarEstudos() {
            try {
                const response = await fetch('/api/studies');
                const estudos = await response.json();
                const container = document.getElementById('container-estudos');

                if (!estudos || estudos.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-book-reader"></i>
                            <h3>Sua biblioteca está vazia</h3>
                            <p style="color: var(--text-dim); margin-top: 10px;">Novos estudos aparecerão aqui assim que seu mestre os publicar.</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = estudos.map(s => `
                    <article class="study-card">
                        <span class="category-tag">${s.category}</span>
                        <h3>${s.title}</h3>
                        <p>${s.content}</p>
                        <div class="card-footer">
                            <span class="date-info">
                                <i class="far fa-calendar-alt"></i> ${s.date}
                            </span>
                            <a href="/estudo/${s.id}" class="btn-read">ACESSAR AULA</a>
                        </div>
                    </article>
                `).join('');
                
            } catch (error) {
                document.getElementById('container-estudos').innerHTML = `
                    <div class="empty-state" style="border-color: #ff4d4d;">
                        <i class="fas fa-exclamation-triangle" style="color: #ff4d4d;"></i>
                        <h3>Erro de Conexão</h3>
                        <p>Não foi possível carregar os estudos. Tente novamente em alguns instantes.</p>
                    </div>
                `;
            }
        }

        // Simulação para quando não há backend rodando (Remova para usar o fetch real)
        /*
        setTimeout(() => {
            const container = document.getElementById('container-estudos');
            container.innerHTML = `
                <article class="study-card">
                    <span class="category-tag">Teologia</span>
                    <h3>Fundamentos da Fé Inabalável</h3>
                    <p>Uma análise profunda sobre os pilares que sustentam a crença cristã em tempos de incerteza...</p>
                    <div class="card-footer">
                        <span class="date-info"><i class="far fa-calendar-alt"></i> 04/04/2026</span>
                        <a href="#" class="btn-read">ACESSAR AULA</a>
                    </div>
                </article>
            `;
        }, 1500);
        */

        carregarEstudos();
    </script>
</body>
</html>
