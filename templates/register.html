<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | ITEL ELIM Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            /* Paleta Oficial ITEL ELIM */
            --primary: #d4e117;       /* Amarelo Limão */
            --secondary: #009ce0;     /* Azul Ciano */
            --accent: #005da3;        /* Azul Médio */
            --bg-dark: #162a44;       /* Azul Marinho */
            --bg-deep: #0d1a2b;       /* Azul Profundo */
            
            --glass: rgba(22, 42, 68, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: var(--bg-deep);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(212, 225, 23, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(0, 156, 224, 0.05) 0%, transparent 40%);
        }

        /* Fundo Animado */
        .Elimn-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 156, 224, 0.03) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            animation: move 20s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        /* Card de Registro */
        .reg-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 50px 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .reg-icon {
            width: 65px; height: 65px;
            background: rgba(212, 225, 23, 0.1);
            border: 2px solid var(--primary);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            color: var(--primary);
            font-size: 1.6rem;
            box-shadow: 0 10px 20px rgba(212, 225, 23, 0.1);
        }

        h2 { color: var(--text-main); font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 35px; }

        /* Inputs */
        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        
        .input-group i {
            position: absolute; left: 18px; top: 50%;
            transform: translateY(-50%);
            color: var(--secondary);
            font-size: 1.1rem;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 16px 20px 16px 52px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: white;
            outline: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 15px rgba(212, 225, 23, 0.1);
        }

        .input-group select { cursor: pointer; appearance: none; }
        .input-group select option { background: var(--bg-deep); color: white; }

        .btn-register {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: var(--bg-deep);
            border: none;
            border-radius: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(212, 225, 23, 0.2);
            filter: brightness(1.1);
        }

        .btn-register:active { transform: translateY(-1px); }

        .footer-links { margin-top: 30px; font-size: 0.9rem; color: var(--text-muted); }
        .footer-links a { color: var(--secondary); text-decoration: none; font-weight: 700; transition: 0.3s; }
        .footer-links a:hover { color: var(--primary); text-decoration: underline; }

        /* Estilo para erro no input */
        .input-error { border-color: #ef4444 !important; }
    </style>
</head>
<body>

    <div class="Elimn-bg">
        <div class="blob"></div>
    </div>

    <main class="reg-card">
        <div class="reg-icon"><i class="fas fa-user-plus"></i></div>
        <h2>Novo Aluno</h2>
        <p class="subtitle">Cadastre-se para acessar o Portal ITEL ELIM</p>

        <form id="registerForm">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="name" placeholder="Nome Completo" required>
            </div>

            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="E-mail Válido" required>
            </div>

            <div class="input-group">
                <i class="fas fa-map-marker-alt"></i>
                <select id="unidade_id" required>
                    <option value="" disabled selected>Selecione sua Unidade</option>
                    {% for unidade in unidades %}
                    <option value="{{ unidade.id }}">{{ unidade.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Crie uma Senha" required>
            </div>

            <button type="submit" class="btn-register" id="btnText">Criar Minha Conta</button>
        </form>

        <div class="footer-links">
            Já possui uma conta? <a href="/login">Fazer Login</a>
        </div>
    </main>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btnText');
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                unidade_id: document.getElementById('unidade_id').value,
                password: document.getElementById('password').value
            };

            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Processando...';
            btn.disabled = true;

            try {
                // Simulação de resposta para demonstração visual
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Bem-vindo!',
                        text: 'Sua conta foi criada com sucesso.',
                        background: '#162a44',
                        color: '#fff',
                        confirmButtonColor: '#d4e117',
                        confirmButtonText: 'Acessar Portal'
                    }).then(() => {
                        window.location.href = result.redirect;
                    });
                } else {
                    throw new Error(result.error || 'Erro ao realizar cadastro.');
                }

            } catch (err) {
                Swal.fire({
                    icon: 'error',
                    title: 'Ops!',
                    text: err.message,
                    background: '#162a44',
                    color: '#fff',
                    confirmButtonColor: '#009ce0'
                });
                btn.innerHTML = 'Criar Minha Conta';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
