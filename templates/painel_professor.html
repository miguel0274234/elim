<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Mestre | ITEL ELIM Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Cores Oficiais ITEL ELIM */
            --primary: #d4e117;       /* Amarelo Limão */
            --secondary: #009ce0;     /* Azul Ciano */
            --bg-deep: #0d1a2b;       /* Azul Profundo */
            --bg-card: rgba(22, 42, 68, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, rgba(0, 156, 224, 0.05), transparent);
        }

        /* Navbar Especial Professor */
        nav {
            padding: 18px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(13, 26, 43, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-prof {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--secondary);
            display: flex;
            align-items: center; gap: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-info { display: flex; gap: 25px; align-items: center; }
        .nav-info span { font-size: 0.85rem; font-weight: 600; color: var(--text-dim); }
        .btn-logout { color: #ff4d4d; text-decoration: none; font-weight: 700; font-size: 0.85rem; transition: 0.3s; }
        .btn-logout:hover { opacity: 0.7; }

        /* Layout Grid */
        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
            padding: 40px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Seções de Vidro */
        .glass-section {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 35px;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 30px; display: flex; align-items: center; gap: 12px; letter-spacing: -0.5px; }
        h2 i { color: var(--primary); }

        /* Formulário de Postagem */
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; margin-bottom: 10px; color: var(--text-dim); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 15px;
            color: white;
            outline: none;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { 
            border-color: var(--secondary); 
            background: rgba(0,0,0,0.4);
        }

        .btn-publish {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            border: none;
            border-radius: 14px;
            color: var(--bg-deep);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 10px;
        }

        .btn-publish:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 12px 24px rgba(212, 225, 23, 0.25);
            filter: brightness(1.1);
        }

        /* Lateral: Gestão de Alunos */
        .aside-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        .enrollment-box {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px dashed rgba(255,255,255,0.1);
        }

        .enrollment-box input {
            width: 100%; margin-bottom: 10px; padding: 12px;
            background: #0d1a2b; border: 1px solid var(--glass-border);
            border-radius: 10px; color: #fff; font-size: 0.85rem;
        }

        .btn-add-student {
            width: 100%; padding: 12px; background: transparent;
            border: 2px solid var(--secondary); color: var(--secondary);
            font-weight: 700; cursor: pointer; border-radius: 10px;
            transition: 0.3s;
        }
        .btn-add-student:hover { background: var(--secondary); color: #fff; }

        .student-list { list-style: none; max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .student-list::-webkit-scrollbar { width: 5px; }
        .student-list::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .student-item {
            display: flex; align-items: center; gap: 15px; padding: 15px;
            background: rgba(255,255,255,0.02); border-radius: 16px;
            margin-bottom: 10px; border: 1px solid transparent; transition: 0.3s;
        }
        .student-item:hover { border-color: var(--glass-border); background: rgba(255,255,255,0.04); }

        .student-avatar {
            width: 42px; height: 42px;
            background: var(--secondary);
            color: #fff; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 0.9rem;
        }

        .student-info p { font-size: 0.9rem; font-weight: 700; }
        .student-info small { color: var(--text-dim); font-size: 0.75rem; }

        /* Toast */
        .toast {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--secondary); color: #fff;
            padding: 16px 28px; border-radius: 16px; font-weight: 700;
            display: none; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 1100px) {
            .dashboard-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-prof">
            <i class="fas fa-crown"></i>
            <span>Portal do Mestre</span>
        </div>
        <div class="nav-info">
            <span>{{ user.unidade.nome_igreja }}</span>
            <a href="/api/auth/logout" class="btn-logout">Finalizar Sessão</a>
        </div>
    </nav>

    <div class="dashboard-container">
        
        <main class="glass-section">
            <h2><i class="fas fa-scroll"></i> Publicar Conteúdo de Elite</h2>
            <form id="studyForm">
                <div class="form-group">
                    <label>Título da Aula / Estudo</label>
                    <input type="text" id="title" placeholder="Ex: A Profundidade da Teoria Bíblica" required>
                </div>
                <div class="form-group">
                    <label>Categoria de Conhecimento</label>
                    <select id="category">
                        <option value="Geral">Geral</option>
                        <option value="Teologia">Teologia</option>
                        <option value="História">História</option>
                        <option value="Vida Cristã">Vida Cristã</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Corpo do Conteúdo</label>
                    <textarea id="content" rows="12" placeholder="Desenvolva o ensinamento aqui..." required></textarea>
                </div>
                <button type="submit" class="btn-publish">Publicar Conhecimento</button>
            </form>
        </main>

        <aside class="glass-section">
            <div class="aside-header">
                <h2><i class="fas fa-user-graduate"></i> Meus Alunos</h2>
            </div>
            
            <div class="enrollment-box">
                <p style="font-size: 0.7rem; color: var(--secondary); font-weight: 800; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px;">Matrícula Rápida</p>
                <input type="text" id="newStudentName" placeholder="Nome do Aluno">
                <input type="email" id="newStudentEmail" placeholder="E-mail de Acesso">
                <button onclick="cadastrarAluno()" class="btn-add-student">Confirmar Matrícula</button>
            </div>

            <ul class="student-list" id="alunoLista">
                </ul>
        </aside>

    </div>

    <div id="toast" class="toast">Ação realizada com sucesso!</div>

    <script>
        // 1. PUBLICAR ESTUDO
        document.getElementById('studyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            
            btn.innerText = "PROCESSANDO...";
            btn.disabled = true;

            const data = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                content: document.getElementById('content').value
            };

            try {
                const response = await fetch('/api/studies/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if(response.ok) {
                    showToast("Conteúdo publicado na unidade!");
                    document.getElementById('studyForm').reset();
                }
            } catch(e) {
                showToast("Erro ao publicar.");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });

        // 2. MATRICULAR ALUNO
        async function cadastrarAluno() {
            const name = document.getElementById('newStudentName').value;
            const email = document.getElementById('newStudentEmail').value;
            
            if(!name || !email) return showToast("Preencha todos os campos.");

            const response = await fetch('/api/professor/cadastrar-aluno', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password: "mudar123" })
            });

            if(response.ok) {
                showToast("Aluno matriculado com sucesso!");
                document.getElementById('newStudentName').value = "";
                document.getElementById('newStudentEmail').value = "";
                carregarAlunos();
            }
        }

        // 3. CARREGAR LISTA DE ALUNOS
        async function carregarAlunos() {
            const lista = document.getElementById('alunoLista');
            lista.innerHTML = '<li style="text-align:center; padding:20px; opacity:0.5; font-size:0.8rem;">Sincronizando base de dados...</li>';
            
            // Simulação de delay de rede
            setTimeout(() => {
                lista.innerHTML = `
                    <li class="student-item">
                        <div class="student-avatar">JD</div>
                        <div class="student-info">
                            <p>João Diniz</p>
                            <small>joao@email.com</small>
                        </div>
                    </li>
                    <li class="student-item">
                        <div class="student-avatar" style="background:var(--primary); color:var(--bg-deep)">MA</div>
                        <div class="student-info">
                            <p>Maria Almeida</p>
                            <small>maria@email.com</small>
                        </div>
                    </li>
                `;
            }, 800);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        carregarAlunos();
    </script>
</body>
</html>
