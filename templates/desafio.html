<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado | ITEL ELIM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary: #d4e117; 
            --secondary: #009ce0; 
            --bg-deep: #050a14; 
            --card-bg: rgba(13, 26, 43, 0.8);
            --border-light: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-deep);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #0d1a2b 0%, #050a14 100%);
        }

        /* Container Principal com Animação de Entrada */
        .result-card {
            width: 90%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(255,255,255,0.02);
            animation: cardEntrance 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Círculo de Score */
        .score-circle {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            border: 4px solid var(--primary);
            box-shadow: 0 0 40px rgba(212, 225, 23, 0.15);
            background: rgba(212, 225, 23, 0.03);
        }

        .score-value {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1;
        }

        .score-label {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--primary);
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* Textos */
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0 0 10px;
            letter-spacing: -0.5px;
        }

        p {
            color: #94a3b8;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* Badge de XP */
        .xp-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-light);
            padding: 12px 25px;
            border-radius: 100px;
            margin-bottom: 40px;
            font-weight: 700;
            color: var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(212, 225, 23, 0.2); }
            70% { box-shadow: 0 0 0 15px rgba(212, 225, 23, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 225, 23, 0); }
        }

        /* Botão de Finalização */
        .btn-finish {
            display: block;
            width: 100%;
            background: var(--primary);
            color: var(--bg-deep);
            text-decoration: none;
            padding: 22px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(212, 225, 23, 0.2);
        }

        .btn-finish:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(212, 225, 23, 0.4);
            filter: brightness(1.1);
        }

        .btn-finish:active { transform: translateY(0); }

    </style>
</head>
<body>

<div class="result-card">
    <div class="score-circle">
        <span class="score-value" id="final-score">1/1</span>
        <span class="score-label">Acertos</span>
    </div>

    <h1>Excelente!</h1>
    <p>Sua performance foi registrada no banco de dados operacional do ITEL.</p>

    <div class="xp-badge">
        <i class="fa-solid fa-bolt-lightning"></i>
        <span>+{{ aula.xp_recompensa }} XP CONQUISTADO</span>
    </div>

    <a href="{{ url_for('lista_aulas') }}" class="btn-finish">
        Concluir Desafio <i class="fa-solid fa-chevron-right" style="margin-left: 8px;"></i>
    </a>
</div>

<script>
    // Disparar confetes automaticamente ao carregar
    window.onload = () => {
        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#d4e117', '#ffffff', '#009ce0']
        });
    };
</script>

</body>
</html>
